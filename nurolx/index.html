function OPALoop({ size = 460, dense = false }) {
  const r = size / 2;
  const ringR = r - 30;
  const [tick, setTick] = React.useState(0);
  const [rot, setRot] = React.useState(0);
  React.useEffect(() => {
    const id = setInterval(() => setTick(t => (t + 1) % 3), 2400);
    return () => clearInterval(id);
  }, []);
  React.useEffect(() => {
    let raf;
    const f = () => { setRot(r => (r + 0.15) % 360); raf = requestAnimationFrame(f); };
    raf = requestAnimationFrame(f);
    return () => cancelAnimationFrame(raf);
  }, []);
  const phases = ['OBSERVE', 'PLAN', 'ACT'];
  const angles = [-90, 30, 150];
  const subs = ['multi-domain awareness', 'doctrine-grounded wargame', 'kinetic + cognitive dispatch'];
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} aria-label="OPA Decision Loop">
      <defs>
        <radialGradient id="opa-glow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor={NUROL_C.forest} stopOpacity="0.35" />
          <stop offset="60%" stopColor={NUROL_C.forestDeep} stopOpacity="0.1" />
          <stop offset="100%" stopColor="#000" stopOpacity="0" />
        </radialGradient>
      </defs>
      <circle cx={r} cy={r} r={ringR + 30} fill="url(#opa-glow)" />
      {[ringR + 12, ringR - 12, ringR - 36].map((rr, i) => (
        <circle key={i} cx={r} cy={r} r={rr} fill="none" stroke={NUROL_C.forestDeep} strokeWidth="0.8" strokeDasharray={i === 1 ? '0' : '1 6'} />
      ))}
      <g transform={`rotate(${rot} ${r} ${r})`}>
        <path
          d={`M ${r} ${r} L ${r} ${r - ringR - 14} A ${ringR + 14} ${ringR + 14} 0 0 1 ${r + (ringR + 14) * Math.sin(Math.PI / 6)} ${r - (ringR + 14) * Math.cos(Math.PI / 6)} Z`}
          fill={NUROL_C.forest} opacity="0.16"
        />
      </g>
      <circle cx={r} cy={r} r={ringR} fill="none" stroke={NUROL_C.forestRing} strokeWidth="1.4" />
      {Array.from({ length: 12 }).map((_, i) => {
        const a = (i * 30 - 90) * Math.PI / 180;
        const x1 = r + (ringR - 4) * Math.cos(a), y1 = r + (ringR - 4) * Math.sin(a);
        const x2 = r + (ringR + 4) * Math.cos(a), y2 = r + (ringR + 4) * Math.sin(a);
        return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke={NUROL_C.forestDeep} strokeWidth="1" />;
      })}
      {angles.map((a, i) => {
        const rad = (a * Math.PI) / 180;
        const x = r + ringR * Math.cos(rad), y = r + ringR * Math.sin(rad);
        const active = tick === i;
        const labelY = i === 0 ? y - 38 : y + 50;
        return (
          <g key={i}>
            {active && <circle cx={x} cy={y} r="38" fill={NUROL_C.mint} opacity="0.12" />}
            <circle cx={x} cy={y} r="22" fill="#15171a" stroke={active ? NUROL_C.mint : NUROL_C.forestRing} strokeWidth="2" />
            <circle cx={x} cy={y} r="6" fill={active ? NUROL_C.mint : NUROL_C.forestRing} />
            <text x={x} y={labelY} fill={active ? NUROL_C.ink : NUROL_C.forestRing} fontSize={dense ? 11 : 13} fontFamily="'Sora', sans-serif" fontWeight="700" textAnchor="middle" letterSpacing="0.22em">{phases[i]}</text>
            {!dense && <text x={x} y={labelY + 16} fill={NUROL_C.inkFaint} fontSize="10" fontFamily="'IBM Plex Mono', monospace" textAnchor="middle" letterSpacing="0.08em">{subs[i]}</text>}
          </g>
        );
      })}
      <g>
        <circle cx={r} cy={r} r="36" fill="#050805" stroke={NUROL_C.gold} strokeWidth="1" />
        <circle cx={r} cy={r} r="28" fill="none" stroke={NUROL_C.goldDim} strokeWidth="0.8" strokeDasharray="2 3" />
        <text x={r} y={r - 2} fill={NUROL_C.gold} fontSize="10" fontFamily="'IBM Plex Mono', monospace" fontWeight="700" textAnchor="middle" letterSpacing="0.2em">DECIDE</text>
        <text x={r} y={r + 11} fill={NUROL_C.goldDim} fontSize="8" fontFamily="'IBM Plex Mono', monospace" textAnchor="middle" letterSpacing="0.14em">human authority</text>
      </g>
    </svg>
  );
}
